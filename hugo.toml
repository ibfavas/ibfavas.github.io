  [[params.projects]]
    title = "Linux Hardening & SIEM Orchestration"
    subtitle = "Hardened Sensor & Compliance Baseline"
    body = "Remediated 100+ security misconfigurations on Arch Linux, raising CIS compliance from 26% to 83%. Hardened the attack surface with kernel module blacklisting, secure mount options, sysctl protections, and 22,000+ auditd rules, then wired the host into a Dockerized Wazuh stack for FIM, SCA, and SOC-style alert triage."
    link = "https://github.com/ibfavas/Arch-Hardening-Project"
    cta = "Open repository"

  [[params.projects]]
    title = "Threat Intel Aggregation & IOC Enrichment Pipeline"
    subtitle = "Blue Team CTI Automation"
    body = "Built a Python CTI pipeline that processes 50k-60k+ IOCs per run from URLhaus, Feodo Tracker, and AlienVault OTX, normalizes and deduplicates 55k+ indicators in SQLite, scores 45k+ IOCs by recency and corroboration, enriches high-confidence IPs with AbuseIPDB and VirusTotal, and exports Wazuh CDB lists with live MITRE-mapped detections."
    link = "https://github.com/ibfavas/threat-intel-pipeline"
    cta = "Open repository"

  [[params.projects]]
    title = "Peelr"
    subtitle = "Lightweight JavaScript scanner"
    body = "Built a stdlib-only JavaScript triage tool in Go for rapid recon across remote and local `.js` files. Peelr identifies hardcoded secrets, risky client-side sinks, endpoints, comments, emails, and filesystem paths, then surfaces risk scores through a CLI, local web UI, scan history, and diff support."
    link = "https://github.com/ibfavas/peelr"
    cta = "Open repository"

  [[params.projects]]
    title = "Infinity Castle"
    subtitle = "Intentionally vulnerable machine"
    body = "Configured hidden entry points, system misconfigurations, and cryptographic challenges to practice reconnaissance, request manipulation, traffic interception, and vertical privilege escalation while studying both offensive paths and defensive detection."

